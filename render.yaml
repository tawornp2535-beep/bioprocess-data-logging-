services:
  - type: web
    name: bioprocess-data-logging
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false   # ← วาง JSON ทั้งหมดของ firebase-service-account.json ในนี้
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: GEMINI_API_KEY
        sync: false

